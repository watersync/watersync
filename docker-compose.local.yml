volumes:
  watersync_local_postgres_data: {}
  watersync_local_postgres_data_backups: {}
  watersync_local_redis_data: {}

services:
  django: &django
    build:
      context: .
      dockerfile: ./compose/local/django/Dockerfile
    image: watersync_local_django
    container_name: watersync_local_django
    depends_on:
      - postgres
      - redis
      - mailpit
    volumes:
      - .:/app:z
    env_file:
      - ./.envs/.local/.django
      - ./.envs/.local/.postgres
    ports:
      - '8000:8000'
    command: /bin/bash -c "python manage.py migrate && uvicorn config.asgi:application --host 0.0.0.0 --port 8000 --reload --reload-include '*.html'"

  postgres:
    build:
      context: .
      dockerfile: ./compose/production/postgres/Dockerfile
    image: watersync_production_postgres
    container_name: watersync_local_postgres
    volumes:
      - watersync_local_postgres_data:/var/lib/postgresql/data
      - watersync_local_postgres_data_backups:/backups
    env_file:
      - ./.envs/.local/.postgres

  mailpit:
    image: docker.io/axllent/mailpit:latest
    container_name: watersync_local_mailpit
    ports:
      - "8025:8025"

  redis:
    image: docker.io/redis:6
    container_name: watersync_local_redis
    volumes:
      - watersync_local_redis_data:/data

  celeryworker:
    <<: *django
    image: watersync_local_celeryworker
    container_name: watersync_local_celeryworker
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: watchfiles --filter python celery.__main__.main --args '-A config.celery_app worker -l INFO'

  celerybeat:
    <<: *django
    image: watersync_local_celerybeat
    container_name: watersync_local_celerybeat
    depends_on:
      - redis
      - postgres
      - mailpit
    ports: []
    command: celery -A config.celery_app beat -l INFO

  flower:
    <<: *django
    image: watersync_local_flower
    container_name: watersync_local_flower
    ports:
      - '5555:5555'
    command: celery -A config.celery_app flower

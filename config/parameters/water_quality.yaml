    default_unit: mg/L
    
  potassium:
    label: "Potassium (K⁺)"
    group: physicochemical
    description: "Potassium ion concentration"
    units: *concentration_molar_units
    default_unit: mg/L
    
  chloride:
    label: "Chloride (Cl⁻)"

    description: "Chloride ion concentration"
    units: *concentration_molar_units
    default_unit: mg/L
    
  sulfate:
    label: "Sulfate (SO₄²⁻)"
    group: physicochemical
    description: "Sulfate ion concentration"
    units: *concentration_molar_units
    default_unit: mg/L
    
  bicarbonate:
    label: "Bicarbonate (HCO₃⁻)"

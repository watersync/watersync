# =============================================================================
# Sensor Variables
# =============================================================================
# Variables measured by automated sensors/loggers

sensor_variables:
  water_level:
    label: "Water Level"
    description: "Height of water surface relative to a reference point"
    units: *length_units
    default_unit: m

  temperature:
    label: "Temperature"
    description: "Water or air temperature"
    units: *temperature_units
    default_unit: degC

  pressure:
    label: "Pressure"
    description: "Atmospheric or water pressure"
    units: *pressure_units
    default_unit: kPa

  electrical_conductivity:
    label: "Electrical Conductivity"
    description: "Ability of water to conduct electricity"
    units: *conductivity_units
    default_unit: uS/cm

  dissolved_oxygen:
    label: "Dissolved Oxygen"
    description: "Concentration of oxygen dissolved in water"
    units:
      mg/L: "mg/L"
      percent: "% saturation"
    default_unit: mg/L

  ph:
    label: "pH"
    description: "Measure of acidity/alkalinity"
    units:
      pH_unit: "pH units"
    default_unit: pH_unit

  turbidity:
    label: "Turbidity"
    description: "Cloudiness of water"
    units:
      NTU: "NTU (Nephelometric Turbidity Units)"
      FNU: "FNU (Formazin Nephelometric Units)"
    default_unit: NTU

  salinity:
    label: "Salinity"
    description: "Salt concentration in water"
    units:
      ppt: "ppt (parts per thousand)"
      PSU: "PSU (Practical Salinity Units)"
      percent: "%"
    default_unit: ppt

  flow_rate:
    label: "Flow Rate"
    description: "Volume of water per unit time"
    units:
      L/s: "L/s (liters per second)"
      m3/s: "m³/s (cubic meters per second)"
      m3/h: "m³/h (cubic meters per hour)"
      gpm: "gpm (gallons per minute)"
    default_unit: L/s

  velocity:
    label: "Flow Velocity"
    description: "Speed of water movement"
    units:
      m/s: "m/s (meters per second)"
      cm/s: "cm/s (centimeters per second)"
      ft/s: "ft/s (feet per second)"
    default_unit: m/s

  rainfall:
    label: "Rainfall"
    description: "Precipitation amount"
    units:
      mm: "mm"
      cm: "cm"
      inch: "in (inches)"
    default_unit: mm

  humidity:
    label: "Relative Humidity"
    description: "Atmospheric moisture content"
    units:
      percent: "%"
    default_unit: percent

  battery_voltage:
    label: "Battery Voltage"
    description: "Sensor battery voltage"
    units: *voltage_units
    default_unit: V

# =============================================================================
# Pint Unit Definitions
# =============================================================================
# These definitions are loaded into the Pint UnitRegistry for unit conversions.
# Format follows Pint's definition syntax. Each line is a definition string.

pint_definitions:
  # Turbidity units
  - "NTU = [turbidity]"
  - "FNU = [turbidity]"
  - "FTU = [turbidity]"
  
  # Bacterial count units  
  - "CFU = [count]"
  - "MPN = [count]"
  - "MPNU = [count]"
  
  # pH and chemical activity
  - "pH_unit = [acidity]"
  - "pH = [acidity]"
  
  # Water quality specific units
  - "ppm_as_CaCO3 = [mass] / [volume]"
  - "mg_CaCO3_per_L = milligram / liter"
  - "equiv_per_L = [amount] / [volume]"
  - "meq_per_L = milli * equiv_per_L"
  
  # Conductivity aliases
  - "uS_per_cm = microsiemens / centimeter"
  - "mS_per_cm = millisiemens / centimeter"
  
  # Dissolved oxygen
  - "mg_O2_per_L = milligram / liter"
  - "percent_saturation = [dimensionless]"
  
  # Chlorophyll
  - "ug_chl_a_per_L = microgram / liter"
  
  # Nitrogen and phosphorus compounds
  - "mg_N_per_L = milligram / liter"
  - "mg_P_per_L = milligram / liter"
  - "mg_NH3_N_per_L = milligram / liter"
  - "mg_NO3_N_per_L = milligram / liter"
  - "mg_PO4_P_per_L = milligram / liter"
  
  # Hydrogeological units - Hydraulic Conductivity
  - "gpd_per_ft2 = gallon / day / foot ** 2"
  
  # Flow Rate
  - "gpm = gallon / minute"
  - "cfs = foot ** 3 / second"
  - "MGD = 1e6 * gallon / day"
  
  # Transmissivity
  - "gpd_per_ft = gallon / day / foot"
  
  # Specific Capacity
  - "gpm_per_ft = gallon / minute / foot"
  
  # Dimensionless Hydrogeological Parameters
  - "storativity = [dimensionless]"
  - "porosity = [dimensionless]"
  - "specific_yield = [dimensionless]"
  
  # Isotope Units
  - "permil = 0.001"
  - "pMC = [dimensionless]"
  - "TU = [dimensionless]"


# =============================================================================
# Reusable Unit Groups
# =============================================================================
# Define groups of units that can be referenced by parameters using YAML anchors

unit_groups:
  concentration: &concentration_units
    mg/L: "mg/L"
    ug/L: "µg/L"
    g/L: "g/L"
    
  concentration_trace: &concentration_trace_units
    ug/L: "µg/L"
    ng/L: "ng/L"
    
  concentration_with_molar: &concentration_molar_units
    mg/L: "mg/L"
    mmol/L: "mmol/L"
    meq/L: "meq/L"
    
  temperature: &temperature_units
    degC: "°C (Celsius)"
    degF: "°F (Fahrenheit)"
    kelvin: "K (Kelvin)"
    
  length: &length_units
    m: "m (meters)"
    cm: "cm (centimeters)"
    mm: "mm (millimeters)"
    ft: "ft (feet)"
    inch: "in (inches)"
    
  pressure: &pressure_units
    kPa: "kPa (kilopascals)"
    Pa: "Pa (pascals)"
    mbar: "mbar (millibars)"
    bar: "bar"
    psi: "psi (pounds per square inch)"
    atm: "atm (atmospheres)"
    
  conductivity: &conductivity_units
    uS/cm: "µS/cm (microsiemens/cm)"
    mS/cm: "mS/cm (millisiemens/cm)"
    S/m: "S/m (siemens/meter)"
    
  voltage: &voltage_units
    mV: "mV (millivolts)"
    V: "V (volts)"
    
  isotope_ratio: &isotope_units
    permille: "‰"
    
  bacterial_count: &bacterial_units
    CFU/100mL: "CFU/100mL"
    MPN/100mL: "MPN/100mL"


# =============================================================================
# Parameter Groups
# =============================================================================

parameter_groups:
  physicochemical:
    label: "Physicochemical"
    code: "PHYS"
    description: "Basic water quality parameters measured in the field"
    
  nutrients:
    label: "Nutrients"
    code: "NUT"
    description: "Nitrogen and phosphorus compounds"
    
  metals:
    label: "Metals"
    code: "MET"
    description: "Heavy metals and trace elements"
    
  organics:
    label: "Organics"
    code: "ORG"
    description: "Organic compounds and carbon"
    
  microbiology:
    label: "Microbiology"
    code: "MIC"
    description: "Bacterial and biological indicators"
    
  isotopes:
    label: "Isotopes"
    code: "ISO"
    description: "Stable and radioactive isotopes"


# =============================================================================
# Water Quality Parameters
# =============================================================================

parameters:
  # ---------------------------------------------------------------------------
  # Physicochemical Parameters
  # ---------------------------------------------------------------------------
  temperature:
    label: "Temperature"
    group: physicochemical
    description: "Water temperature"
    units: *temperature_units
    default_unit: degC
    
  ph:
    label: "pH"
    group: physicochemical
    description: "Measure of acidity/alkalinity"
    units:
      pH_unit: "pH units"
    default_unit: pH_unit
    
  electrical_conductivity:
    label: "Electrical Conductivity"
    group: physicochemical
    description: "Ability of water to conduct electricity"
    units: *conductivity_units
    default_unit: uS/cm
    
  dissolved_oxygen:
    label: "Dissolved Oxygen"
    group: physicochemical
    description: "Concentration of oxygen dissolved in water"
    units:
      mg/L: "mg/L"
      percent: "% saturation"
    default_unit: mg/L
    
  turbidity:
    label: "Turbidity"
    group: physicochemical
    description: "Cloudiness of water"
    units:
      NTU: "NTU (Nephelometric Turbidity Units)"
      FNU: "FNU (Formazin Nephelometric Units)"
    default_unit: NTU
    
  redox_potential:
    label: "Redox Potential (ORP)"
    group: physicochemical
    description: "Oxidation-reduction potential"
    units: *voltage_units
    default_unit: mV
    
  tds:
    label: "Total Dissolved Solids"
    group: physicochemical
    description: "Total dissolved solids concentration"
    units:
      mg/L: "mg/L"
      g/L: "g/L"
      ppm: "ppm"
    default_unit: mg/L
    
  alkalinity:
    label: "Alkalinity"
    group: physicochemical
    description: "Buffering capacity of water"
    units:
      mg/L: "mg/L as CaCO₃"
      meq/L: "meq/L"
    default_unit: mg/L
    
  hardness:
    label: "Hardness"
    group: physicochemical
    description: "Total hardness (Ca + Mg)"
    units:
      mg/L: "mg/L as CaCO₃"
      mmol/L: "mmol/L"
      dGH: "°dH (German degrees)"
    default_unit: mg/L


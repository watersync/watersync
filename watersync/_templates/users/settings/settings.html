{% extends 'layouts/base_dashboard.html' %}

{% load crispy_forms_tags %}
{% load static %}

{% block content %}
<div class="accordion accordion-flush" id="accordionSettings">
    <div class="accordion-item">
      <h2 class="accordion-header" id="flush-protocols">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapsProtocols" aria-expanded="false" aria-controls="flush-collapsProtocols">
          Sampling protocols
        </button>
      </h2>
      <div id="flush-collapsProtocols" class="accordion-collapse collapse" aria-labelledby="flush-protocols" data-bs-parent="#accordionSettings">
        <div class="accordion-body">
          <div id="protocols" class="container p-4">
            {% with list_config=protocols.list_config htmx_context="block" %}
                {% include "list.html"%}
            {% endwith %}
        </div>
        </div>
      </div>
    </div>
  </div>

{% endblock %}
